<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타임아카이브 — 디자인 뷰어</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #111111;
  --surface: #1c1c1e;
  --border:  #2c2c2e;
  --text:    #f5f5f7;
  --muted:   #86868b;
  --dim:     #3a3a3c;
  --sidebar: 228px;
  --topbar:  44px;
}
html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── LAYOUT ─────────────────────────────────── */
.layout { display: flex; height: 100vh; }

/* ── SIDEBAR ────────────────────────────────── */
.sidebar {
  width: var(--sidebar); flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo {
  font-size: 11px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted);
}
.sidebar-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-top: 4px;
}

/* Design list */
.design-list {
  flex: 1; overflow-y: auto; padding: 10px 8px;
  scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
}
.design-btn {
  width: 100%; background: transparent; border: none;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  transition: background .15s; text-align: left;
  color: var(--text); margin-bottom: 2px;
}
.design-btn:hover { background: var(--dim); }
.design-btn.active { background: #2a2a2c; }
.design-btn.active .d-name { color: var(--text); }

.d-dot {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,.85);
}
.d-meta { min-width: 0; }
.d-id   { font-size: 10px; color: var(--muted); letter-spacing: .06em; line-height: 1.2; }
.d-name { font-size: 13px; font-weight: 500; color: rgba(245,245,247,.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: inline-block;
  background: rgba(44,74,71,.35); color: #5eada8;
}

.design-btn .kbd {
  margin-left: auto; flex-shrink: 0;
  font-size: 10px; color: var(--muted);
  background: var(--dim); border-radius: 4px; padding: 2px 5px;
  font-family: monospace;
}

/* ── DEVICE SWITCHER ────────────────────────── */
.device-panel {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.device-label {
  font-size: 10px; font-weight: 600; letter-spacing: .10em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  padding: 0 4px;
}
.device-btns { display: flex; gap: 4px; }
.dev-btn {
  flex: 1; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 4px; cursor: pointer; color: var(--muted);
  font-size: 11px; font-weight: 500; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.dev-btn svg { opacity: .55; }
.dev-btn:hover { border-color: var(--text); color: var(--text); }
.dev-btn:hover svg { opacity: .9; }
.dev-btn.active { background: var(--dim); border-color: #5a5a5e; color: var(--text); }
.dev-btn.active svg { opacity: 1; }

/* Shortcuts hint */
.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--muted); line-height: 1.6;
  flex-shrink: 0;
}

/* ── MAIN ───────────────────────────────────── */
.main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

/* Top bar */
.topbar {
  height: var(--topbar); flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0; padding: 0 16px;
}
.tb-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.tb-url  { font-size: 11px; color: var(--muted); margin-right: 12px; font-family: monospace; }
.tb-actions { display: flex; gap: 8px; }
.tb-btn {
  background: var(--dim); border: none; color: var(--text);
  border-radius: 6px; padding: 6px 12px; cursor: pointer;
  font-size: 12px; font-weight: 500; transition: background .15s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
}
.tb-btn:hover { background: #3a3a3c; }
.tb-btn.compare-btn { background: transparent; border: 1px solid var(--border); }
.tb-btn.compare-btn.on { background: rgba(44,74,71,.4); border-color: #2c4a47; color: #5eada8; }

/* Preview area */
.preview-area {
  flex: 1; overflow: hidden; background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

/* Single iframe mode */
.frame-wrap {
  width: 100%; height: 100%;
  display: flex; align-items: flex-start; justify-content: center;
  overflow: auto; padding: 0;
  transition: all .2s;
}
.frame-wrap.device-tablet { padding: 20px; align-items: flex-start; }
.frame-wrap.device-mobile { padding: 20px; align-items: flex-start; }

.frame-shell {
  width: 100%; height: 100%; flex-shrink: 0;
  background: #fff; overflow: hidden;
  box-shadow: none;
  transition: width .25s cubic-bezier(.4,0,.2,1);
}
.frame-wrap.device-tablet .frame-shell {
  width: 768px; min-height: 100%;
  border-radius: 12px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 24px 80px rgba(0,0,0,.6);
}
.frame-wrap.device-mobile .frame-shell {
  width: 390px; min-height: 100%;
  border-radius: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 24px 80px rgba(0,0,0,.6);
}

#preview {
  width: 100%; height: 100%; border: none; display: block;
}
.frame-wrap.device-tablet #preview,
.frame-wrap.device-mobile  #preview {
  width: 100%; height: 100%; min-height: 900px;
}

/* Compare mode (2 iframes side by side) */
.compare-area {
  display: none; width: 100%; height: 100%; gap: 0;
}
.compare-area.show { display: flex; }
.compare-pane {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border);
}
.compare-pane:last-child { border-right: none; }
.compare-label {
  height: 36px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
  font-size: 12px; font-weight: 500; color: var(--muted); flex-shrink: 0;
}
.compare-label .cl-dot { width: 10px; height: 10px; border-radius: 50%; }
.compare-pane iframe { flex: 1; width: 100%; border: none; }

/* Compare design selector */
.compare-selector { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.compare-selector select {
  background: var(--dim); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; font-size: 11px; padding: 3px 6px; cursor: pointer;
}

/* Loading overlay */
.loading {
  position: absolute; inset: 0; background: rgba(10,10,10,.7);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10;
}
.loading.show { opacity: 1; }
.spinner {
  width: 28px; height: 28px; border: 2px solid rgba(255,255,255,.1);
  border-top-color: #5eada8; border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Time Archive</div>
      <div class="sidebar-title">디자인 뷰어</div>
    </div>

    <nav class="design-list" id="designList">

      <button class="design-btn active"
        data-src="design-a-darkroom.html"
        data-name="시안 A · 다크룸"
        data-color="#C8483C">
        <span class="d-dot" style="background:#1a0e0c;">A</span>
        <span class="d-meta">
          <span class="d-id">Design A</span>
          <span class="d-name">다크룸</span>
        </span>
        <span class="kbd">1</span>
      </button>

      <button class="design-btn"
        data-src="design-b-archive.html"
        data-name="시안 B · 아카이브"
        data-color="#2C4A47">
        <span class="d-dot" style="background:#2C4A47;">B</span>
        <span class="d-meta">
          <span class="d-id">Design B</span>
          <span class="d-name">아카이브</span>
          <span class="d-badge">✓ 확정</span>
        </span>
        <span class="kbd">2</span>
      </button>

      <button class="design-btn"
        data-src="design-c-editorial.html"
        data-name="시안 C · 에디토리얼"
        data-color="#B8923A">
        <span class="d-dot" style="background:#8B6E28;">C</span>
        <span class="d-meta">
          <span class="d-id">Design C</span>
          <span class="d-name">에디토리얼</span>
        </span>
        <span class="kbd">3</span>
      </button>

      <button class="design-btn"
        data-src="design-d-chrome.html"
        data-name="시안 D · 크롬"
        data-color="#3A3A3C">
        <span class="d-dot" style="background:#3A3A3C;">D</span>
        <span class="d-meta">
          <span class="d-id">Design D</span>
          <span class="d-name">크롬</span>
        </span>
        <span class="kbd">4</span>
      </button>

      <button class="design-btn"
        data-src="design-e-store.html"
        data-name="시안 E · 스토어"
        data-color="#0066cc">
        <span class="d-dot" style="background:#0066cc;">E</span>
        <span class="d-meta">
          <span class="d-id">Design E</span>
          <span class="d-name">스토어</span>
        </span>
        <span class="kbd">5</span>
      </button>

      <button class="design-btn"
        data-src="design-f-editorial.html"
        data-name="시안 F · 에디토리얼 아카이브"
        data-color="#2c4a47">
        <span class="d-dot" style="background:#2c4a47;">F</span>
        <span class="d-meta">
          <span class="d-id">Design F</span>
          <span class="d-name">에디토리얼 아카이브</span>
        </span>
        <span class="kbd">6</span>
      </button>

      <button class="design-btn"
        data-src="design-g-studio.html"
        data-name="시안 G · 스튜디오 和"
        data-color="#2c4a47">
        <span class="d-dot" style="background:#1c2a29;">G</span>
        <span class="d-meta">
          <span class="d-id">Design G</span>
          <span class="d-name">스튜디오 和</span>
        </span>
        <span class="kbd">7</span>
      </button>

      <button class="design-btn"
        data-src="design-h-visual.html"
        data-name="시안 H · 비주얼 핀터레스트"
        data-color="#E60023">
        <span class="d-dot" style="background:#E60023;">H</span>
        <span class="d-meta">
          <span class="d-id">Design H</span>
          <span class="d-name">비주얼 핀터레스트</span>
        </span>
        <span class="kbd">8</span>
      </button>

    </nav>

    <!-- Device switcher -->
    <div class="device-panel">
      <div class="device-label">화면 크기</div>
      <div class="device-btns">
        <button class="dev-btn active" data-device="desktop" title="데스크탑">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="1" y="1" width="14" height="9" rx="1.5"/>
            <line x1="5" y1="11" x2="11" y2="11"/>
            <line x1="8" y1="10" x2="8" y2="11"/>
          </svg>
          데스크탑
        </button>
        <button class="dev-btn" data-device="tablet" title="태블릿 (768px)">
          <svg width="10" height="14" viewBox="0 0 10 14" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="1" y="1" width="8" height="12" rx="1.5"/>
            <circle cx="5" cy="11.5" r=".75" fill="currentColor" stroke="none"/>
          </svg>
          태블릿
        </button>
        <button class="dev-btn" data-device="mobile" title="모바일 (390px)">
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="1" y="1" width="6" height="12" rx="1.5"/>
            <line x1="3" y1="2.5" x2="5" y2="2.5"/>
            <circle cx="4" cy="11.5" r=".75" fill="currentColor" stroke="none"/>
          </svg>
          모바일
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      단축키 1–7 로 시안 전환<br>
      D = 데스크탑 · T = 태블릿 · M = 모바일<br>
      C = 비교 모드 on/off
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <span class="tb-name" id="tbName">시안 A · 다크룸</span>
      <span class="tb-url" id="tbUrl">design-a-darkroom.html</span>
      <div class="tb-actions">
        <button class="tb-btn compare-btn" id="compareBtn" title="C">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="1" y="1" width="4.5" height="11" rx="1"/>
            <rect x="7.5" y="1" width="4.5" height="11" rx="1"/>
          </svg>
          비교 모드
        </button>
        <a class="tb-btn" id="openLink" href="design-a-darkroom.html" target="_blank">
          새 탭 ↗
        </a>
      </div>
    </div>

    <!-- Preview area -->
    <div class="preview-area">

      <!-- Single view -->
      <div class="frame-wrap" id="frameWrap">
        <div class="frame-shell" id="frameShell">
          <iframe id="preview" src="design-a-darkroom.html" title="디자인 미리보기"></iframe>
        </div>
      </div>

      <!-- Compare view -->
      <div class="compare-area" id="compareArea">
        <div class="compare-pane">
          <div class="compare-label">
            <span class="cl-dot" id="compDotA" style="background:#C8483C"></span>
            <span id="compNameA">시안 A · 다크룸</span>
            <div class="compare-selector">
              <select id="compSelectA" title="왼쪽 시안 선택"></select>
            </div>
          </div>
          <iframe id="compFrameA" src="design-a-darkroom.html"></iframe>
        </div>
        <div class="compare-pane">
          <div class="compare-label">
            <span class="cl-dot" id="compDotB" style="background:#2C4A47"></span>
            <span id="compNameB">시안 B · 아카이브</span>
            <div class="compare-selector">
              <select id="compSelectB" title="오른쪽 시안 선택"></select>
            </div>
          </div>
          <iframe id="compFrameB" src="design-b-archive.html"></iframe>
        </div>
      </div>

      <!-- Loading spinner -->
      <div class="loading" id="loading"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<script>
const designs = [
  { id:'A', src:'design-a-darkroom.html',   name:'시안 A · 다크룸',             color:'#C8483C', dotBg:'#1a0e0c' },
  { id:'B', src:'design-b-archive.html',    name:'시안 B · 아카이브',            color:'#2C4A47', dotBg:'#2C4A47', confirmed:true },
  { id:'C', src:'design-c-editorial.html',  name:'시안 C · 에디토리얼',          color:'#B8923A', dotBg:'#8B6E28' },
  { id:'D', src:'design-d-chrome.html',     name:'시안 D · 크롬',               color:'#3A3A3C', dotBg:'#3A3A3C' },
  { id:'E', src:'design-e-store.html',      name:'시안 E · 스토어',              color:'#0066cc', dotBg:'#0066cc' },
  { id:'F', src:'design-f-editorial.html',  name:'시안 F · 에디토리얼 아카이브', color:'#2c4a47', dotBg:'#2c4a47' },
  { id:'G', src:'design-g-studio.html',     name:'시안 G · 스튜디오 和',         color:'#1c2a29', dotBg:'#1c2a29' },
  { id:'H', src:'design-h-visual.html',    name:'시안 H · 비주얼 핀터레스트',   color:'#E60023', dotBg:'#E60023' },
];

// State
let currentIdx    = 0;
let currentDevice = 'desktop';
let compareMode   = false;

// DOM refs
const preview     = document.getElementById('preview');
const frameWrap   = document.getElementById('frameWrap');
const frameShell  = document.getElementById('frameShell');
const compareArea = document.getElementById('compareArea');
const compareBtn  = document.getElementById('compareBtn');
const tbName      = document.getElementById('tbName');
const tbUrl       = document.getElementById('tbUrl');
const openLink    = document.getElementById('openLink');
const loading     = document.getElementById('loading');
const compSelectA = document.getElementById('compSelectA');
const compSelectB = document.getElementById('compSelectB');
const compFrameA  = document.getElementById('compFrameA');
const compFrameB  = document.getElementById('compFrameB');
const compNameA   = document.getElementById('compNameA');
const compNameB   = document.getElementById('compNameB');
const compDotA    = document.getElementById('compDotA');
const compDotB    = document.getElementById('compDotB');

// Populate compare selects
function buildSelectOptions(selectEl, selectedSrc) {
  selectEl.innerHTML = '';
  designs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.src;
    opt.textContent = d.name;
    if (d.src === selectedSrc) opt.selected = true;
    selectEl.appendChild(opt);
  });
}
buildSelectOptions(compSelectA, designs[0].src);
buildSelectOptions(compSelectB, designs[1].src);

compSelectA.addEventListener('change', () => {
  const d = designs.find(x => x.src === compSelectA.value);
  if (!d) return;
  compNameA.textContent = d.name;
  compDotA.style.background = d.dotBg;
  compFrameA.src = d.src;
});
compSelectB.addEventListener('change', () => {
  const d = designs.find(x => x.src === compSelectB.value);
  if (!d) return;
  compNameB.textContent = d.name;
  compDotB.style.background = d.dotBg;
  compFrameB.src = d.src;
});

// Load design
function loadDesign(idx) {
  const d = designs[idx];
  currentIdx = idx;

  // Update sidebar buttons
  document.querySelectorAll('.design-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  // Update topbar
  tbName.textContent = d.name;
  tbUrl.textContent  = d.src;
  openLink.href      = d.src;

  // Show loading
  loading.classList.add('show');

  // Load iframe
  preview.onload = () => loading.classList.remove('show');
  preview.src    = d.src;

  // Sync left compare pane to current design
  if (!compareMode) {
    compSelectA.value = d.src;
    compNameA.textContent = d.name;
    compDotA.style.background = d.dotBg;
    compFrameA.src = d.src;
  }
}

// Set device
function setDevice(device) {
  currentDevice = device;
  document.querySelectorAll('.dev-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.device === device);
  });
  frameWrap.className = 'frame-wrap' + (device !== 'desktop' ? ` device-${device}` : '');
}

// Toggle compare mode
function toggleCompare() {
  compareMode = !compareMode;
  compareBtn.classList.toggle('on', compareMode);
  compareBtn.querySelector('span, svg') // just toggle classes
  frameWrap.style.display  = compareMode ? 'none' : '';
  compareArea.classList.toggle('show', compareMode);
}

// Sidebar clicks
document.getElementById('designList').addEventListener('click', e => {
  const btn = e.target.closest('.design-btn');
  if (!btn) return;
  const idx = [...document.querySelectorAll('.design-btn')].indexOf(btn);
  loadDesign(idx);
});

// Device clicks
document.querySelectorAll('.dev-btn').forEach(btn => {
  btn.addEventListener('click', () => setDevice(btn.dataset.device));
});

// Compare button
compareBtn.addEventListener('click', toggleCompare);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  const key = e.key.toLowerCase();
  if (key >= '1' && key <= '8') {
    loadDesign(parseInt(key) - 1);
  } else if (key === 'd') {
    setDevice('desktop');
  } else if (key === 't') {
    setDevice('tablet');
  } else if (key === 'm') {
    setDevice('mobile');
  } else if (key === 'c') {
    toggleCompare();
  }
});
</script>
</body>
</html>
